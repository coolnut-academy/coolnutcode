<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Optimization Workspace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Component สำหรับ Render Icon อย่างปลอดภัย ไม่ให้ชนกับ React Virtual DOM
        const Icon = ({ name, className }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    // Inject <i> tag ลงไปแบบแมนนวล เพื่อให้ React ไม่ต้องมาจัดการ DOM ส่วนนี้
                    containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    window.lucide.createIcons({
                        root: containerRef.current
                    });
                }
            }, [name, className]);

            // display: contents ทำให้ span นี้ทำตัวโปร่งใส ไม่ส่งผลต่อ Flex/Grid Layout
            return <span ref={containerRef} style={{ display: 'contents' }}></span>;
        };

        const TABS = [
            { id: 'new', title: 'New Project', icon: 'folder-plus' },
            { id: 'existing', title: 'Existing Project', icon: 'folder-tree' }
        ];

        const WORKFLOWS = {
            new: {
                planning: {
                    id: 'planning',
                    title: 'Step 0: Planner',
                    icon: 'map',
                    desc: 'แปลงไอเดียเป็นแผนการพัฒนาโปรเจกต์ใหม่',
                    placeholder: 'เช่น: อยากทำแอปจดบันทึกด้วย Next.js และ Firebase',
                    defaultText: 'อยากทำโปรเจคเกี่ยวกับ...\n\nฟีเจอร์หลักที่ต้องการ:\n1. \n2. \n\nTech Stack ที่เล็งไว้:\n- \n- ',
                    tips: [
                        'กำหนดเป้าหมายให้ชัดเจน',
                        'ระบุ Tech Stack ที่ต้องการใช้',
                        'แบ่งงานเป็นเฟสย่อยๆ (Phases)'
                    ],
                    systemPrompt: `You are an expert PM. Convert Thai idea to a structured Step 0 Planning prompt in English. Include Goal, Tech Stack, Phases, Constraints, and Token rules.`
                },
                build: {
                    id: 'build',
                    title: 'Mid-Dev Build',
                    icon: 'code',
                    desc: 'สร้าง Prompt สำหรับเพิ่มฟีเจอร์ย่อย',
                    placeholder: 'เช่น: เพิ่มปุ่ม Login',
                    defaultText: 'ฟีเจอร์ที่อยากเพิ่ม:\n- \n\nข้อจำกัด (Constraints):\n- ให้แก้ไขเฉพาะจุดที่จำเป็น ห้ามกระทบโครงสร้างหลัก\n- ',
                    tips: [
                        'ระบุปัญหาให้แคบที่สุด (Isolate)',
                        'สั่งให้แก้เฉพาะจุด ไม่เขียนใหม่ทั้งไฟล์'
                    ],
                    systemPrompt: `Convert Thai request to an optimized English coding prompt. Focus on minimal diffs and specific requirements.`
                },
                debug: {
                    id: 'debug',
                    title: 'Debug & Fix',
                    icon: 'bug',
                    desc: 'ล่าบั๊กและหาข้อผิดพลาด',
                    placeholder: 'บอกพฤติกรรมที่เกิดขึ้นจริง vs ที่คาดหวัง',
                    defaultText: 'พฤติกรรมปัจจุบัน (Current Behavior):\n- \n\nสิ่งที่ควรจะเป็น (Expected Behavior):\n- \n\nError Log (ถ้ามี):\n- ',
                    tips: [
                        'บอกพฤติกรรมที่เกิดขึ้นจริง',
                        'แนบ Error Log เสมอ (ถ้ามี)',
                        'สั่งให้ AI อธิบายสาเหตุก่อนเขียนโค้ดแก้'
                    ],
                    systemPrompt: `You are an expert debugging prompt optimizer. Convert Thai bug description to a structured English debugging prompt. Format with Current Behavior, Expected Behavior, and Debugging Constraints (analyze root cause before writing code).`
                },
                qa: {
                    id: 'qa',
                    title: 'Final QA',
                    icon: 'check-circle',
                    desc: 'ตรวจสอบคุณภาพและ Responsive',
                    placeholder: 'ตรวจหา Feature ที่อาจหายไป',
                    defaultText: 'รบกวนตรวจสอบ (QA) ส่วนต่อไปนี้ให้หน่อย:\n1. \n2. \n\nเช็คเรื่อง Responsive บนมือถือและ Error ใน Console ด้วย',
                    tips: [
                        'สั่งตรวจสอบ Responsive',
                        'ตรวจหา Feature ที่อาจพังระหว่างการแก้บั๊ก'
                    ],
                    systemPrompt: `You are a QA engineering prompt optimizer. Convert Thai input to a structured English QA audit prompt. Ask the AI to perform a final engineering audit and list issues without fixing them immediately.`
                }
            },
            existing: {
                extract: {
                    id: 'extract',
                    title: 'Step 0: Extract Context',
                    icon: 'file-text',
                    desc: 'ให้ AI ศึกษาโปรเจคเดิมและสรุปเป็น Document',
                    placeholder: 'ช่วยสรุปโครงสร้างไฟล์และการไหลของข้อมูล',
                    defaultText: 'ช่วยวิเคราะห์และสรุปโครงสร้างของโปรเจคนี้ให้หน่อยครับ\n\nสิ่งที่ต้องการให้ AI โฟกัสเป็นพิเศษ:\n1. ภาพรวมของ Architecture\n2. การจัดการ State และ Data Flow\n3. Component หลักๆ ที่สำคัญ',
                    tips: [
                        'ใส่ Link GitHub Public ด้านบนได้เลย',
                        'บอก AI ว่าโปรเจคนี้ใช้ Stack อะไร',
                        'ผลลัพธ์คือคำสั่งให้ IDE ของคุณสร้าง doc.md'
                    ],
                    systemPrompt: `You are an expert software architect. Generates a prompt for an AI assistant to scan the codebase (locally or via provided GitHub link) and create 'architecture.md' and 'components.md'.`
                },
                action: {
                    id: 'action',
                    title: 'Step 1: Modify & Update',
                    icon: 'git-merge',
                    desc: 'สั่งแก้/เพิ่มฟีเจอร์ โดยอ้างอิง Doc เดิม',
                    placeholder: 'อ้างอิงไฟล์ architecture.md',
                    defaultText: 'อ้างอิงจากไฟล์ Document (เช่น architecture.md) ของโปรเจคนี้\n\nสิ่งที่ต้องการให้ทำ (Action):\n- \n\nข้อจำกัด (Constraints):\n- ให้ยึดตามโครงสร้างและสไตล์การเขียนโค้ดเดิมอย่างเคร่งครัด\n- แก้ไขเฉพาะไฟล์ที่เกี่ยวข้องเท่านั้น',
                    tips: [
                        'อ้างอิงชื่อไฟล์ .md ที่สร้างไว้ใน Step 0',
                        'สั่งให้ทำตามสไตล์โค้ดเดิมเป๊ะๆ'
                    ],
                    systemPrompt: `Generate an English prompt for modifying code based on existing context documents. Emphasize strict consistency with existing architecture.`
                },
                debug_existing: {
                    id: 'debug_existing',
                    title: 'Debug Existing',
                    icon: 'alert-triangle',
                    desc: 'แก้บั๊กโดยไม่ให้กระทบโครงสร้างเดิม',
                    placeholder: 'บั๊กที่เจอในโปรเจค',
                    defaultText: 'อ้างอิงจากไฟล์ Document ของโปรเจค\n\nปัญหาที่เจอตอนนี้ (Current Behavior):\n- \n\nข้อจำกัดในการแก้:\n- ห้ามเปลี่ยนแปลงโครงสร้าง Data Flow เดิม\n- ห้ามแก้ไฟล์ที่ไม่เกี่ยวข้อง',
                    tips: [
                        'เตือน AI ไม่ให้แก้โค้ดจนกระทบฟีเจอร์อื่น',
                        'สั่งให้หาสาเหตุในขอบเขตของ Architecture เดิม'
                    ],
                    systemPrompt: `Generate an English debugging prompt for an existing system. Emphasize that fixes must align with the current architecture and not break dependencies.`
                }
            }
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('new');
            const [activeMode, setActiveMode] = useState('planning');
            const [inputText, setInputText] = useState(WORKFLOWS['new']['planning'].defaultText);
            const [githubUrl, setGithubUrl] = useState('');
            const [outputText, setOutputText] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isCopied, setIsCopied] = useState(false);

            const handleCopy = () => {
                if (!outputText) return;
                const textArea = document.createElement("textarea");
                textArea.value = outputText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleModeChange = (tabId, modeId) => {
                setActiveTab(tabId);
                setActiveMode(modeId);
                setInputText(WORKFLOWS[tabId][modeId].defaultText || '');
                setOutputText('');
            };

            const generatePrompt = async () => {
                if (!inputText.trim()) return;
                setIsLoading(true);
                setOutputText('');
                
                const apiKey = ""; 

                try {
                    const activeModeData = WORKFLOWS[activeTab][activeMode];
                    const fullInput = (activeTab === 'existing' && githubUrl)
                        ? `GitHub Repository: ${githubUrl}\n\nUser Request: ${inputText}` 
                        : inputText;

                    const payload = {
                        contents: [{ parts: [{ text: fullInput }] }],
                        systemInstruction: { parts: [{ text: activeModeData.systemPrompt }] },
                        generationConfig: { temperature: 0.3 }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error("เกิดข้อผิดพลาดในการเรียก API กรุณาลองใหม่อีกครั้ง");

                    const data = await response.json();
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error generating output.";
                    setOutputText(result.trim());
                } catch (error) {
                    setOutputText(`Error: ${error.message}`);
                } finally {
                    setIsLoading(false);
                }
            };

            const activeModeData = WORKFLOWS[activeTab][activeMode];

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <div className="w-full md:w-72 glass-panel border-r border-gray-700 flex flex-col shrink-0 z-10 shadow-xl">
                        <div className="p-6 border-b border-gray-700 bg-gray-900/50">
                            <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent flex items-center gap-2">
                                <Icon name="zap" className="w-6 h-6 text-blue-400" />
                                PromptMVP
                            </h1>
                            <p className="text-xs text-gray-400 mt-1">Lean Workspace v1.5.1 (Full Version)</p>
                        </div>

                        {/* Tabs */}
                        <div className="p-3 border-b border-gray-700 flex gap-1 bg-gray-800/30 shrink-0">
                            {TABS.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => {
                                        const firstMode = Object.keys(WORKFLOWS[tab.id])[0];
                                        handleModeChange(tab.id, firstMode);
                                    }}
                                    className={`flex-1 flex flex-col items-center py-2.5 rounded-lg text-xs font-medium transition-all ${
                                        activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-700/50'
                                    }`}
                                >
                                    <Icon name={tab.icon} className="w-4 h-4 mb-1.5" />
                                    {tab.title}
                                </button>
                            ))}
                        </div>

                        {/* Mode List */}
                        <div className="p-4 flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-2">
                            <p className="text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">Select Workflow</p>
                            {Object.values(WORKFLOWS[activeTab]).map((mode) => (
                                <button
                                    key={mode.id}
                                    onClick={() => handleModeChange(activeTab, mode.id)}
                                    className={`w-full text-left px-4 py-3.5 rounded-xl flex items-center gap-3 transition-all border ${
                                        activeMode === mode.id 
                                        ? 'bg-blue-600/20 text-blue-400 border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.1)]' 
                                        : 'border-transparent text-gray-400 hover:bg-gray-800/80 hover:border-gray-700'
                                    }`}
                                >
                                    <Icon name={mode.icon} className="w-4 h-4 shrink-0" />
                                    <span className="font-medium text-sm leading-tight">{mode.title}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gray-800/20 via-gray-900 to-black">
                        
                        {/* Top Header */}
                        <header className="h-20 border-b border-gray-700 flex items-center px-8 glass-panel shrink-0 shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="p-2.5 bg-gray-800/80 rounded-xl border border-gray-700 text-blue-400 shadow-inner">
                                    <Icon name={activeModeData.icon} className="w-6 h-6" />
                                </div>
                                <div>
                                    <h2 className="text-lg font-bold text-gray-100">{activeModeData.title}</h2>
                                    <p className="text-sm text-gray-400">{activeModeData.desc}</p>
                                </div>
                            </div>
                        </header>

                        {/* Workspace Grid */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-6 lg:p-8 flex flex-col xl:flex-row gap-6">
                            
                            {/* Input & Output Column */}
                            <div className="flex-1 flex flex-col gap-6">
                                
                                {/* Input Box */}
                                <div className="glass-panel rounded-2xl overflow-hidden flex flex-col shadow-xl border border-gray-700/50 relative">
                                    <div className="bg-gray-800/90 px-5 py-3 border-b border-gray-700/50 flex flex-col gap-3">
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs font-bold text-gray-300 uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="message-square" className="w-3.5 h-3.5" />
                                                Thai Input Area
                                            </span>
                                        </div>
                                        
                                        {/* GitHub Link for Existing Project Mode */}
                                        {activeTab === 'existing' && (
                                            <div className="flex items-center gap-3 bg-black/40 p-2.5 rounded-lg border border-gray-700/50 shadow-inner transition-colors focus-within:border-blue-500/50">
                                                <Icon name="github" className="w-4 h-4 text-gray-400 shrink-0" />
                                                <input 
                                                    type="text"
                                                    placeholder="แปะลิงก์ GitHub Public Repository ที่นี่ (Optional)"
                                                    value={githubUrl}
                                                    onChange={(e) => setGithubUrl(e.target.value)}
                                                    className="bg-transparent text-sm text-blue-300 w-full focus:outline-none placeholder-gray-600"
                                                />
                                            </div>
                                        )}
                                    </div>
                                    
                                    <textarea 
                                        className="w-full bg-black/20 p-5 text-gray-200 resize-none h-48 lg:h-56 focus:outline-none placeholder-gray-600 text-sm leading-relaxed custom-scrollbar"
                                        placeholder={activeModeData.placeholder}
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                    ></textarea>
                                    
                                    <div className="bg-gray-900/80 p-4 border-t border-gray-700/50 flex justify-end">
                                        <button 
                                            onClick={generatePrompt}
                                            disabled={isLoading || !inputText.trim()}
                                            className="bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 disabled:from-gray-700 disabled:to-gray-700 disabled:text-gray-500 text-white text-sm font-semibold py-2.5 px-8 rounded-xl transition-all flex items-center gap-2 shadow-lg shadow-blue-900/20"
                                        >
                                            {isLoading ? <Icon name="loader-2" className="w-4 h-4 animate-spin" /> : <Icon name="sparkles" className="w-4 h-4" />}
                                            {isLoading ? 'Processing...' : 'Generate English Prompt'}
                                        </button>
                                    </div>
                                </div>

                                {/* Output Box */}
                                <div className="glass-panel rounded-2xl flex-1 flex flex-col shadow-xl border border-gray-700/50 overflow-hidden min-h-[350px]">
                                    <div className="bg-gray-800/90 px-5 py-3 border-b border-gray-700/50 flex justify-between items-center">
                                        <span className="text-xs font-bold text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                                            <Icon name="terminal" className="w-3.5 h-3.5" />
                                            Optimized Prompt (English)
                                        </span>
                                        <button 
                                            onClick={handleCopy}
                                            disabled={!outputText}
                                            className="text-gray-300 hover:text-white disabled:opacity-30 transition-all flex items-center gap-2 text-xs font-medium bg-gray-700/50 hover:bg-gray-600 px-3 py-1.5 rounded-lg border border-gray-600/50"
                                        >
                                            <Icon name={isCopied ? "check" : "copy"} className="w-3.5 h-3.5" />
                                            {isCopied ? 'Copied to Clipboard!' : 'Copy Prompt'}
                                        </button>
                                    </div>
                                    <div className="p-6 flex-1 overflow-y-auto bg-[#05080f] font-mono text-sm text-gray-300 whitespace-pre-wrap custom-scrollbar leading-relaxed">
                                        {outputText ? (
                                            <div className="animate-in fade-in duration-300">{outputText}</div>
                                        ) : (
                                            <div className="flex flex-col items-center justify-center h-full text-gray-600 italic gap-3 opacity-50">
                                                <Icon name="box-select" className="w-10 h-10" />
                                                <p>ผลลัพธ์ภาษาอังกฤษจะปรากฏที่นี่...</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Tips Column */}
                            <div className="w-full xl:w-80 flex flex-col gap-6">
                                <div className="glass-panel rounded-2xl border border-gray-700/50 overflow-hidden shadow-xl">
                                    <div className="bg-gray-800/90 px-5 py-4 border-b border-gray-700/50 flex items-center gap-2">
                                        <Icon name="lightbulb" className="w-5 h-5 text-yellow-400" />
                                        <span className="text-sm font-bold text-gray-200">Tips & How-to</span>
                                    </div>
                                    <div className="p-5 bg-gray-900/60">
                                        <ul className="space-y-4">
                                            {activeModeData.tips.map((tip, idx) => (
                                                <li key={idx} className="flex gap-3 items-start text-sm text-gray-300">
                                                    <div className="bg-emerald-500/10 p-1 rounded-full shrink-0">
                                                        <Icon name="check" className="w-3 h-3 text-emerald-400" />
                                                    </div>
                                                    <span className="leading-snug">{tip}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
