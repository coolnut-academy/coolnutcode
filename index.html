<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptMVP - Prompt Optimization Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            background: #090d14;
            color: #f8fafc;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        button, input, textarea, select { font: inherit; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            backdrop-filter: blur(14px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.85); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .focus-ring:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useMemo, useRef, useState } = React;

        const STORAGE_KEYS = {
            apiKey: "promptmvp.geminiApiKey",
            model: "promptmvp.geminiModel",
            rememberApiKey: "promptmvp.rememberApiKey"
        };

        const DEFAULT_MODEL = "gemini-2.5-flash";
        const GEMINI_ENDPOINT = "https://generativelanguage.googleapis.com/v1beta/models";

        const Icon = ({ name, className = "" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current || !window.lucide) return;
                containerRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                window.lucide.createIcons({ root: containerRef.current });
            }, [name, className]);

            return <span ref={containerRef} style={{ display: "contents" }} aria-hidden="true"></span>;
        };

        const TABS = [
            { id: "new", title: "New Project", icon: "folder-plus" },
            { id: "existing", title: "Existing Project", icon: "folder-tree" }
        ];

        const WORKFLOWS = {
            new: {
                planning: {
                    id: "planning",
                    title: "Step 0: Planner",
                    icon: "map",
                    desc: "แปลงไอเดียเป็นแผนพัฒนาโปรเจกต์ใหม่",
                    placeholder: "เช่น: อยากทำแอปจดบันทึกด้วย Next.js และ Firebase",
                    defaultText: "อยากทำโปรเจคเกี่ยวกับ...\n\nฟีเจอร์หลักที่ต้องการ:\n1. \n2. \n\nTech Stack ที่เล็งไว้:\n- \n- ",
                    tips: [
                        "กำหนดเป้าหมาย ผู้ใช้ และผลลัพธ์ที่ต้องการให้ชัด",
                        "ระบุ stack, hosting, budget และข้อจำกัดตั้งแต่ต้น",
                        "แบ่งงานเป็นเฟสที่ทดสอบได้ ไม่กว้างจนเกินไป"
                    ],
                    systemPrompt: "You are an expert product manager and senior software architect. Convert the Thai project idea into a structured English Step 0 planning prompt. Include Goal, Users, Core Features, Tech Stack, Architecture, Data Model, Phases, Risks, QA checklist, and explicit constraints. Keep it actionable for an AI coding agent."
                },
                build: {
                    id: "build",
                    title: "Mid-Dev Build",
                    icon: "code-2",
                    desc: "สร้าง prompt สำหรับเพิ่มฟีเจอร์ย่อยในงานที่กำลังพัฒนา",
                    placeholder: "เช่น: เพิ่มปุ่ม Login และเก็บ session ใน localStorage",
                    defaultText: "ฟีเจอร์ที่อยากเพิ่ม:\n- \n\nบริบทของโปรเจค:\n- \n\nข้อจำกัด (Constraints):\n- ให้แก้ไขเฉพาะจุดที่จำเป็น ห้ามกระทบโครงสร้างหลัก\n- ",
                    tips: [
                        "บอกไฟล์หรือ component ที่เกี่ยวข้องถ้ารู้",
                        "ระบุ acceptance criteria เพื่อให้ตรวจงานง่าย",
                        "ย้ำให้ทำ diff เล็กและทดสอบจุดที่เปลี่ยน"
                    ],
                    systemPrompt: "Convert the Thai feature request into an optimized English coding prompt for an AI coding agent. Emphasize minimal diffs, existing style, explicit acceptance criteria, test expectations, and what files or behaviors must not be changed."
                },
                debug: {
                    id: "debug",
                    title: "Debug & Fix",
                    icon: "bug",
                    desc: "จัดรูปคำสั่งสำหรับไล่บั๊กและแก้ปัญหาอย่างเป็นระบบ",
                    placeholder: "บอกพฤติกรรมที่เกิดขึ้นจริง เทียบกับสิ่งที่คาดหวัง",
                    defaultText: "พฤติกรรมปัจจุบัน (Current Behavior):\n- \n\nสิ่งที่ควรจะเป็น (Expected Behavior):\n- \n\nError Log หรือขั้นตอนทำซ้ำ (ถ้ามี):\n- ",
                    tips: [
                        "ใส่ขั้นตอนทำซ้ำและ error log ให้ครบ",
                        "แยก current behavior กับ expected behavior",
                        "ให้ AI อธิบาย root cause ก่อนแก้โค้ด"
                    ],
                    systemPrompt: "You are an expert debugging prompt optimizer. Convert the Thai bug report into a structured English debugging prompt with Reproduction Steps, Current Behavior, Expected Behavior, Logs, Suspected Scope, Root Cause Analysis requirement, Fix Constraints, and Regression Tests."
                },
                qa: {
                    id: "qa",
                    title: "Final QA",
                    icon: "check-circle-2",
                    desc: "เตรียมคำสั่งตรวจคุณภาพ ฟีเจอร์ตกหล่น และ responsive",
                    placeholder: "เช่น: ตรวจ flow สมัครสมาชิกและการแสดงผลมือถือ",
                    defaultText: "รบกวนตรวจสอบ (QA) ส่วนต่อไปนี้ให้หน่อย:\n1. \n2. \n\nเช็คเรื่อง responsive บนมือถือ, accessibility, และ error ใน console ด้วย",
                    tips: [
                        "ระบุ flow สำคัญที่ห้ามพัง",
                        "ให้รายงานเฉพาะประเด็นที่มีผลต่อผู้ใช้",
                        "แยก findings, risk, และ test gaps"
                    ],
                    systemPrompt: "You are a QA engineering prompt optimizer. Convert the Thai QA request into a structured English audit prompt. Ask the AI to inspect behavior, responsiveness, accessibility, console errors, missing edge cases, and regression risk. Findings should be listed before any suggested fixes."
                }
            },
            existing: {
                extract: {
                    id: "extract",
                    title: "Step 0: Extract Context",
                    icon: "file-text",
                    desc: "ให้ AI ศึกษาโปรเจกต์เดิมและสรุปเป็นเอกสาร",
                    placeholder: "ช่วยสรุปโครงสร้างไฟล์และการไหลของข้อมูล",
                    defaultText: "ช่วยวิเคราะห์และสรุปโครงสร้างของโปรเจคนี้ให้หน่อยครับ\n\nสิ่งที่ต้องการให้ AI โฟกัสเป็นพิเศษ:\n1. ภาพรวมของ architecture\n2. การจัดการ state และ data flow\n3. component หลักๆ ที่สำคัญ",
                    tips: [
                        "ใส่ลิงก์ GitHub public ด้านบนได้",
                        "บอก stack และโฟลเดอร์สำคัญถ้ารู้",
                        "ขอผลลัพธ์เป็นไฟล์เอกสารที่ใช้ต่อในงานถัดไป"
                    ],
                    systemPrompt: "You are an expert software architect. Generate an English prompt for an AI coding assistant to scan an existing codebase locally or from the provided public GitHub repository. The assistant must create architecture.md and components.md with architecture overview, data flow, state management, main files, risks, and maintenance notes."
                },
                action: {
                    id: "action",
                    title: "Step 1: Modify & Update",
                    icon: "git-merge",
                    desc: "สั่งแก้หรือเพิ่มฟีเจอร์โดยอ้างอิงเอกสารเดิม",
                    placeholder: "เช่น: อ้างอิง architecture.md แล้วเพิ่ม export CSV",
                    defaultText: "อ้างอิงจากไฟล์ document เช่น architecture.md ของโปรเจคนี้\n\nสิ่งที่ต้องการให้ทำ (Action):\n- \n\nข้อจำกัด (Constraints):\n- ให้ยึดตามโครงสร้างและสไตล์การเขียนโค้ดเดิมอย่างเคร่งครัด\n- แก้ไขเฉพาะไฟล์ที่เกี่ยวข้องเท่านั้น",
                    tips: [
                        "อ้างชื่อไฟล์เอกสารจาก Step 0",
                        "ระบุขอบเขตไฟล์หรือ module ที่อยากให้แตะ",
                        "ใส่ acceptance criteria เพื่อกันการตีความกว้าง"
                    ],
                    systemPrompt: "Generate an English implementation prompt for modifying an existing project based on its context documents. Emphasize strict consistency with the current architecture, minimal file changes, no unrelated refactors, acceptance criteria, and verification commands."
                },
                debug_existing: {
                    id: "debug_existing",
                    title: "Debug Existing",
                    icon: "alert-triangle",
                    desc: "แก้บั๊กในระบบเดิมโดยลดผลกระทบต่อส่วนอื่น",
                    placeholder: "บั๊กที่เจอในโปรเจค",
                    defaultText: "อ้างอิงจากไฟล์ document ของโปรเจค\n\nปัญหาที่เจอตอนนี้ (Current Behavior):\n- \n\nข้อจำกัดในการแก้:\n- ห้ามเปลี่ยนแปลงโครงสร้าง data flow เดิม\n- ห้ามแก้ไฟล์ที่ไม่เกี่ยวข้อง",
                    tips: [
                        "บอก scope ที่น่าจะเกี่ยวข้องกับบั๊ก",
                        "ย้ำให้หาสาเหตุก่อนลงมือแก้",
                        "ขอ regression test สำหรับ flow ที่เคยพัง"
                    ],
                    systemPrompt: "Generate an English debugging prompt for an existing system. Require root cause analysis before code changes, alignment with current architecture, minimal diffs, no unrelated edits, and regression checks for dependent features."
                }
            }
        };

        const classNames = (...values) => values.filter(Boolean).join(" ");

        const safeGithubUrl = (value) => {
            if (!value.trim()) return true;
            try {
                const url = new URL(value.trim());
                return url.hostname === "github.com" && url.pathname.split("/").filter(Boolean).length >= 2;
            } catch {
                return false;
            }
        };

        const makeLocalPrompt = ({ activeModeData, activeTab, inputText, githubUrl }) => {
            const repoLine = activeTab === "existing" && githubUrl.trim()
                ? `\nRepository: ${githubUrl.trim()}\n`
                : "";

            return [
                "# Optimized English Prompt",
                "",
                activeModeData.systemPrompt,
                repoLine,
                "## User Context",
                inputText.trim(),
                "",
                "## Output Requirements",
                "- Write in clear, implementation-ready English.",
                "- Preserve the user's constraints and do not invent unavailable project details.",
                "- Ask concise clarifying questions only if the task cannot be completed safely.",
                "- Prefer GitHub Pages-compatible, static-friendly choices unless the user explicitly allows a backend.",
                "- Include verification steps and expected acceptance criteria."
            ].filter(Boolean).join("\n");
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState("new");
            const [activeMode, setActiveMode] = useState("planning");
            const [inputText, setInputText] = useState(WORKFLOWS.new.planning.defaultText);
            const [githubUrl, setGithubUrl] = useState("");
            const [outputText, setOutputText] = useState("");
            const [statusText, setStatusText] = useState("พร้อมใช้งานแบบ local fallback");
            const [isLoading, setIsLoading] = useState(false);
            const [isCopied, setIsCopied] = useState(false);
            const [rememberApiKey, setRememberApiKey] = useState(() => localStorage.getItem(STORAGE_KEYS.rememberApiKey) === "true");
            const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE_KEYS.apiKey) || sessionStorage.getItem(STORAGE_KEYS.apiKey) || "");
            const [model, setModel] = useState(() => localStorage.getItem(STORAGE_KEYS.model) || DEFAULT_MODEL);
            const [useApi, setUseApi] = useState(() => Boolean(localStorage.getItem(STORAGE_KEYS.apiKey) || sessionStorage.getItem(STORAGE_KEYS.apiKey)));
            const [showSettings, setShowSettings] = useState(false);

            const activeModeData = WORKFLOWS[activeTab][activeMode];
            const githubUrlIsValid = safeGithubUrl(githubUrl);

            const apiStateLabel = useMemo(() => {
                if (!useApi) return "Local mode";
                if (!apiKey.trim()) return "API key needed";
                return "Gemini API ready";
            }, [apiKey, useApi]);

            useEffect(() => {
                if (apiKey.trim()) {
                    if (rememberApiKey) {
                        localStorage.setItem(STORAGE_KEYS.apiKey, apiKey.trim());
                        sessionStorage.removeItem(STORAGE_KEYS.apiKey);
                    } else {
                        sessionStorage.setItem(STORAGE_KEYS.apiKey, apiKey.trim());
                        localStorage.removeItem(STORAGE_KEYS.apiKey);
                    }
                } else {
                    localStorage.removeItem(STORAGE_KEYS.apiKey);
                    sessionStorage.removeItem(STORAGE_KEYS.apiKey);
                }
            }, [apiKey, rememberApiKey]);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEYS.rememberApiKey, rememberApiKey ? "true" : "false");
                if (!rememberApiKey) {
                    localStorage.removeItem(STORAGE_KEYS.apiKey);
                    if (apiKey.trim()) sessionStorage.setItem(STORAGE_KEYS.apiKey, apiKey.trim());
                }
            }, [rememberApiKey, apiKey]);

            useEffect(() => {
                const normalized = model.trim() || DEFAULT_MODEL;
                localStorage.setItem(STORAGE_KEYS.model, normalized);
            }, [model]);

            const handleCopy = async () => {
                if (!outputText) return;
                try {
                    await navigator.clipboard.writeText(outputText);
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 1800);
                } catch {
                    const textArea = document.createElement("textarea");
                    textArea.value = outputText;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textArea);
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 1800);
                }
            };

            const handleModeChange = (tabId, modeId) => {
                setActiveTab(tabId);
                setActiveMode(modeId);
                setInputText(WORKFLOWS[tabId][modeId].defaultText || "");
                setOutputText("");
                setStatusText("เปลี่ยน workflow แล้ว");
            };

            const callGemini = async (fullInput) => {
                const payload = {
                    contents: [{ role: "user", parts: [{ text: fullInput }] }],
                    systemInstruction: { parts: [{ text: activeModeData.systemPrompt }] },
                    generationConfig: { temperature: 0.25 }
                };

                const cleanModel = (model.trim() || DEFAULT_MODEL).replace(/^models\//, "");
                const response = await fetch(`${GEMINI_ENDPOINT}/${encodeURIComponent(cleanModel)}:generateContent`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-goog-api-key": apiKey.trim()
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let detail = "";
                    try {
                        const errorBody = await response.json();
                        detail = errorBody.error?.message ? `: ${errorBody.error.message}` : "";
                    } catch {}
                    throw new Error(`เรียก Gemini API ไม่สำเร็จ (${response.status})${detail}`);
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.map((part) => part.text || "").join("\n").trim()
                    || "ไม่พบข้อความใน response จาก API";
            };

            const generatePrompt = async () => {
                if (!inputText.trim()) return;
                if (activeTab === "existing" && !githubUrlIsValid) {
                    setStatusText("ลิงก์ GitHub ไม่ถูกต้อง");
                    return;
                }

                setIsLoading(true);
                setOutputText("");
                setIsCopied(false);

                const fullInput = activeTab === "existing" && githubUrl.trim()
                    ? `GitHub Repository: ${githubUrl.trim()}\n\nUser Request:\n${inputText.trim()}`
                    : inputText.trim();

                try {
                    if (useApi && apiKey.trim()) {
                        setStatusText("กำลังเรียก Gemini API...");
                        const result = await callGemini(fullInput);
                        setOutputText(result);
                        setStatusText("สร้างด้วย Gemini API สำเร็จ");
                    } else {
                        const result = makeLocalPrompt({ activeModeData, activeTab, inputText, githubUrl });
                        setOutputText(result);
                        setStatusText("สร้างแบบ local fallback สำเร็จ");
                    }
                } catch (error) {
                    const fallback = makeLocalPrompt({ activeModeData, activeTab, inputText, githubUrl });
                    setOutputText(`${fallback}\n\n---\nAPI note: ${error.message}\nระบบจึงสร้าง prompt แบบ local fallback ให้แทน`);
                    setStatusText("API มีปัญหา ใช้ local fallback แทน");
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-[#090d14] text-slate-100">
                    <div className="min-h-screen flex flex-col lg:flex-row">
                        <aside className="glass-panel lg:w-72 shrink-0 lg:h-screen lg:sticky lg:top-0 flex flex-col border-r border-slate-700/60">
                            <div className="p-5 border-b border-slate-700/60">
                                <div className="flex items-center gap-3">
                                    <div className="grid h-10 w-10 place-items-center rounded-lg bg-cyan-500/12 text-cyan-300 border border-cyan-300/20">
                                        <Icon name="zap" className="w-5 h-5" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-tight">PromptMVP</h1>
                                        <p className="text-xs text-slate-400">Static workspace for GitHub Pages</p>
                                    </div>
                                </div>
                            </div>

                            <div className="p-3 border-b border-slate-700/60 grid grid-cols-2 gap-2">
                                {TABS.map((tab) => (
                                    <button
                                        key={tab.id}
                                        type="button"
                                        onClick={() => handleModeChange(tab.id, Object.keys(WORKFLOWS[tab.id])[0])}
                                        className={classNames(
                                            "focus-ring rounded-lg px-3 py-3 text-xs font-semibold transition flex flex-col items-center gap-1.5",
                                            activeTab === tab.id ? "bg-cyan-500 text-slate-950" : "text-slate-400 hover:bg-slate-800"
                                        )}
                                    >
                                        <Icon name={tab.icon} className="w-4 h-4" />
                                        <span>{tab.title}</span>
                                    </button>
                                ))}
                            </div>

                            <nav className="p-4 flex-1 overflow-y-auto custom-scrollbar">
                                <p className="text-[11px] font-bold uppercase tracking-widest text-slate-500 mb-3">Workflow</p>
                                <div className="space-y-2">
                                    {Object.values(WORKFLOWS[activeTab]).map((mode) => (
                                        <button
                                            key={mode.id}
                                            type="button"
                                            onClick={() => handleModeChange(activeTab, mode.id)}
                                            className={classNames(
                                                "focus-ring w-full text-left rounded-lg px-4 py-3 flex items-center gap-3 border transition",
                                                activeMode === mode.id
                                                    ? "border-cyan-400/50 bg-cyan-400/10 text-cyan-200"
                                                    : "border-transparent text-slate-400 hover:border-slate-700 hover:bg-slate-800/80"
                                            )}
                                        >
                                            <Icon name={mode.icon} className="w-4 h-4 shrink-0" />
                                            <span className="text-sm font-medium">{mode.title}</span>
                                        </button>
                                    ))}
                                </div>
                            </nav>
                        </aside>

                        <main className="flex-1 min-w-0">
                            <header className="glass-panel border-b border-slate-700/60 px-4 sm:px-6 py-4">
                                <div className="flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                                    <div className="flex items-center gap-3 min-w-0">
                                        <div className="grid h-11 w-11 place-items-center rounded-lg bg-slate-800 text-cyan-300 border border-slate-700">
                                            <Icon name={activeModeData.icon} className="w-5 h-5" />
                                        </div>
                                        <div className="min-w-0">
                                            <h2 className="text-lg font-bold truncate">{activeModeData.title}</h2>
                                            <p className="text-sm text-slate-400">{activeModeData.desc}</p>
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap items-center gap-2">
                                        <span className={classNames(
                                            "rounded-full px-3 py-1 text-xs font-semibold border",
                                            useApi && apiKey.trim()
                                                ? "bg-emerald-400/10 text-emerald-300 border-emerald-300/25"
                                                : "bg-amber-400/10 text-amber-200 border-amber-200/25"
                                        )}>
                                            {apiStateLabel}
                                        </span>
                                        <button
                                            type="button"
                                            onClick={() => setShowSettings((value) => !value)}
                                            className="focus-ring rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-sm text-slate-200 hover:bg-slate-700 flex items-center gap-2"
                                        >
                                            <Icon name="settings" className="w-4 h-4" />
                                            API Settings
                                        </button>
                                    </div>
                                </div>

                                {showSettings && (
                                    <div className="mt-4 grid gap-3 rounded-lg border border-slate-700 bg-slate-950/75 p-4 md:grid-cols-[1fr_1fr_auto]">
                                        <label className="block">
                                            <span className="text-xs font-semibold text-slate-400">Gemini API Key (ไม่ฝังลงไฟล์เว็บ)</span>
                                            <input
                                                type="password"
                                                value={apiKey}
                                                onChange={(event) => setApiKey(event.target.value)}
                                                placeholder="AIza..."
                                                className="focus-ring mt-1 w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-600"
                                            />
                                        </label>
                                        <label className="block">
                                            <span className="text-xs font-semibold text-slate-400">Model</span>
                                            <input
                                                type="text"
                                                value={model}
                                                onChange={(event) => setModel(event.target.value)}
                                                placeholder={DEFAULT_MODEL}
                                                className="focus-ring mt-1 w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-600"
                                            />
                                        </label>
                                        <label className="flex items-center gap-3 rounded-lg border border-slate-700 bg-slate-900 px-3 py-2">
                                            <input
                                                type="checkbox"
                                                checked={useApi}
                                                onChange={(event) => setUseApi(event.target.checked)}
                                                className="h-4 w-4 accent-cyan-400"
                                            />
                                            <span className="text-sm text-slate-200">Use API</span>
                                        </label>
                                        <label className="md:col-span-3 flex items-center gap-3 rounded-lg border border-slate-800 bg-slate-950/70 px-3 py-2">
                                            <input
                                                type="checkbox"
                                                checked={rememberApiKey}
                                                onChange={(event) => setRememberApiKey(event.target.checked)}
                                                className="h-4 w-4 accent-cyan-400"
                                            />
                                            <span className="text-sm text-slate-300">Remember key on this browser</span>
                                        </label>
                                        <p className="md:col-span-3 text-xs leading-5 text-slate-500">
                                            GitHub Pages เก็บ secret ฝั่ง server ไม่ได้ จึงไม่ควรฝัง API key ในไฟล์นี้ ค่าเริ่มต้นจะเก็บคีย์แค่ใน session ของ browser; ถ้าไม่เปิด API ระบบจะสร้าง prompt ด้วย template ในหน้าเว็บแทน
                                        </p>
                                    </div>
                                )}
                            </header>

                            <section className="p-4 sm:p-6 grid gap-5 xl:grid-cols-[minmax(0,1fr)_320px]">
                                <div className="grid gap-5">
                                    <section className="glass-panel rounded-lg overflow-hidden">
                                        <div className="border-b border-slate-700/60 bg-slate-900/70 p-4 grid gap-3">
                                            <div className="flex items-center justify-between gap-3">
                                                <h3 className="text-xs font-bold uppercase tracking-widest text-slate-300 flex items-center gap-2">
                                                    <Icon name="message-square" className="w-4 h-4" />
                                                    Thai Input Area
                                                </h3>
                                                <span className="text-xs text-slate-500">{inputText.trim().length} chars</span>
                                            </div>
                                            {activeTab === "existing" && (
                                                <label className="block">
                                                    <span className="sr-only">GitHub repository URL</span>
                                                    <div className={classNames(
                                                        "flex items-center gap-3 rounded-lg border bg-slate-950 px-3 py-2",
                                                        githubUrlIsValid ? "border-slate-700" : "border-rose-400/70"
                                                    )}>
                                                        <Icon name="github" className="w-4 h-4 text-slate-400 shrink-0" />
                                                        <input
                                                            type="url"
                                                            value={githubUrl}
                                                            onChange={(event) => setGithubUrl(event.target.value)}
                                                            placeholder="แปะลิงก์ GitHub Public Repository ที่นี่ (optional)"
                                                            className="focus-ring w-full bg-transparent text-sm text-cyan-100 placeholder:text-slate-600 outline-none"
                                                        />
                                                    </div>
                                                    {!githubUrlIsValid && <p className="mt-2 text-xs text-rose-300">กรุณาใช้ลิงก์รูปแบบ https://github.com/owner/repo</p>}
                                                </label>
                                            )}
                                        </div>
                                        <textarea
                                            className="focus-ring custom-scrollbar block min-h-[260px] w-full resize-y bg-slate-950/70 p-5 text-sm leading-7 text-slate-100 placeholder:text-slate-600 outline-none"
                                            placeholder={activeModeData.placeholder}
                                            value={inputText}
                                            onChange={(event) => setInputText(event.target.value)}
                                        ></textarea>
                                        <div className="border-t border-slate-700/60 bg-slate-900/70 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                            <p className="text-xs text-slate-400">{statusText}</p>
                                            <button
                                                type="button"
                                                onClick={generatePrompt}
                                                disabled={isLoading || !inputText.trim()}
                                                className="focus-ring inline-flex items-center justify-center gap-2 rounded-lg bg-cyan-400 px-5 py-2.5 text-sm font-bold text-slate-950 transition hover:bg-cyan-300 disabled:cursor-not-allowed disabled:bg-slate-700 disabled:text-slate-500"
                                            >
                                                {isLoading ? <Icon name="loader-2" className="w-4 h-4 animate-spin" /> : <Icon name="sparkles" className="w-4 h-4" />}
                                                {isLoading ? "Processing..." : "Generate English Prompt"}
                                            </button>
                                        </div>
                                    </section>

                                    <section className="glass-panel rounded-lg overflow-hidden min-h-[360px] flex flex-col">
                                        <div className="border-b border-slate-700/60 bg-slate-900/70 p-4 flex items-center justify-between gap-3">
                                            <h3 className="text-xs font-bold uppercase tracking-widest text-emerald-300 flex items-center gap-2">
                                                <Icon name="terminal" className="w-4 h-4" />
                                                Optimized Prompt
                                            </h3>
                                            <button
                                                type="button"
                                                onClick={handleCopy}
                                                disabled={!outputText}
                                                className="focus-ring inline-flex items-center gap-2 rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-slate-700 disabled:opacity-40"
                                            >
                                                <Icon name={isCopied ? "check" : "copy"} className="w-4 h-4" />
                                                {isCopied ? "Copied" : "Copy"}
                                            </button>
                                        </div>
                                        <div className="custom-scrollbar flex-1 overflow-auto bg-[#05080f] p-5 font-mono text-sm leading-7 text-slate-300 whitespace-pre-wrap">
                                            {outputText || (
                                                <div className="grid h-full min-h-[260px] place-items-center text-center text-slate-600">
                                                    <div>
                                                        <Icon name="box-select" className="w-10 h-10 mx-auto mb-3" />
                                                        <p>ผลลัพธ์ภาษาอังกฤษจะปรากฏที่นี่</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </section>
                                </div>

                                <aside className="grid gap-5 content-start">
                                    <section className="glass-panel rounded-lg overflow-hidden">
                                        <div className="border-b border-slate-700/60 bg-slate-900/70 p-4 flex items-center gap-2">
                                            <Icon name="lightbulb" className="w-5 h-5 text-amber-300" />
                                            <h3 className="text-sm font-bold">Tips & How-to</h3>
                                        </div>
                                        <ul className="p-4 space-y-3">
                                            {activeModeData.tips.map((tip, index) => (
                                                <li key={index} className="flex gap-3 text-sm leading-6 text-slate-300">
                                                    <span className="mt-1 grid h-5 w-5 shrink-0 place-items-center rounded-full bg-emerald-400/10 text-emerald-300">
                                                        <Icon name="check" className="w-3 h-3" />
                                                    </span>
                                                    <span>{tip}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </section>

                                    <section className="glass-panel rounded-lg p-4">
                                        <div className="flex items-center gap-2 text-sm font-bold text-slate-100">
                                            <Icon name="shield-check" className="w-5 h-5 text-cyan-300" />
                                            GitHub Pages Compatible
                                        </div>
                                        <p className="mt-3 text-sm leading-6 text-slate-400">
                                            เว็บนี้ยังเป็น static HTML + React CDN ทั้งหมด ใช้บน GitHub Pages ได้โดยไม่ต้องมี backend แต่ API key จะไม่ถูกซ่อนถ้าฝังลง repo จึงให้ผู้ใช้ใส่เองในเบราว์เซอร์
                                        </p>
                                    </section>
                                </aside>
                            </section>
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
