<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOLNUTCODE - AI Project Workflow Builder</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" type="image/png" href="./coolnutcode-icon-192.png">
    <link rel="apple-touch-icon" href="./coolnutcode-apple-touch-icon.png">
    <link rel="manifest" href="./manifest.webmanifest">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { color-scheme: dark; }
        body {
            margin: 0;
            background: #090d14;
            color: #f8fafc;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
        button, input, textarea, select { font: inherit; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            backdrop-filter: blur(14px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.85); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .focus-ring:focus-visible {
            outline: 2px solid #38bdf8;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="./app.js" defer></script>
</body>
</html>
